services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Database connection
      DB_HOST: db
      DB_DIALECT: mariadb
      DB_PORT: 3306
      DB_NAME: scubakeep-db
      DB_USER: scubakeep-db-user
      DB_PASSWORD: scubakeep-db-pw

      # MinIO connection
      BUCKET_HOST: minio
      BUCKET_PORT: 9000
      BUCKET_ACCESS_KEY: minioadmin
      BUCKET_ACCESS_SECRET: minioadminpw
      BUCKET_NAME: files
    ports:
      - "8080:8080"
    networks:
      - scubakeep-net
    depends_on:
      - db
      - minio

  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: scubakeep-db
      MYSQL_USER: scubakeep-db-user
      MYSQL_PASSWORD: scubakeep-db-pw
    ports:
      - "3306:3306"
    volumes:
      - scubakeep_mariadb_data:/var/lib/mysql
    networks:
      - scubakeep-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpw
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - scubakeep_minio_data:/data
    networks:
      - scubakeep-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      BUCKET_HOST: ${BUCKET_HOST:-minio}
      BUCKET_PORT: ${BUCKET_PORT:-9000}
      BUCKET_ACCESS_KEY: ${BUCKET_ACCESS_KEY:-minioadmin}
      BUCKET_ACCESS_SECRET: ${BUCKET_ACCESS_SECRET:-minioadminpw}
      BUCKET_NAME: ${BUCKET_NAME:-files}
    volumes:
      - ./minio-init/init.sh:/init.sh:ro
      - ./minio-init/files:/seed-files:ro
    entrypoint: [ "/bin/sh", "/init.sh" ]
    networks:
      - scubakeep-net

volumes:
  scubakeep_mariadb_data:
  scubakeep_minio_data:

networks:
  scubakeep-net: